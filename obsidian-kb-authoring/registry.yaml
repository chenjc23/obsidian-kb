# 结构唯一来源。维护者维护本文件；团队只维护 templates/*.template.md。
# 改落点/视图/lint/枚举 → 改这里一处即可。可读视图：`node obsidian-kb.mjs describe [types|views|shapes|tree]`。
schema:
  requiredFrontmatter: [title, type, repo, created, updated, confidence, status, sources]
  confidence: [high, medium, low]
  status: [active, partial, draft, deprecated]
  # init 预建目录的显式单一来源。
  # 仓内目录需要 repo 名，init 只预建工作区层与 repos 根。
  initDirs: [global/use-cases, global/domains, global/contracts, global/architecture, global/extra, repos]

types:
  use-case:
    template: use-case
    target: global/use-cases/{title}.md
    view: usecase
    summary: 跨仓端到端业务场景，编排 + 链接为主
  domain:
    template: domain
    target: global/domains/{title}.md
    view: logical
    summary: 业务域概念字典
  contract:
    template: contract
    target: global/contracts/{title}.md
    view: contract
    summary: 跨边界契约，定义一次被多 flow 引用
    linkage:
      - needLink: [repos/]
        message: Contract page should link producer or consumer repo pages, submodule pages, or flow pages
  overview:
    template: overview
    target: repos/{repo}/overview.md
    view: development
    summary: 模块定义、职责边界、上下文
  constraints:
    template: constraints
    target: repos/{repo}/constraints.md
    view: development
    summary: 设计约束与原则
  architecture:
    template: architecture
    target: repos/{repo}/architecture.md
    view: logical
    summary: 仓库逻辑视图 + 路由 + 架构图
  glossary:
    template: glossary
    target: repos/{repo}/glossary.md
    view: logical
    summary: 仓内术语→链接索引
  system-architecture:
    template: architecture
    target: global/architecture/system-architecture.md
    view: logical
    pageType: architecture          # scaffold system-architecture 产出的页面 type: architecture
    summary: 工作区唯一人工叙事总览（复用 architecture 模板）
  api-surface:
    template: api-surface
    target: repos/{repo}/api-surface.md
    view: contract
    summary: 仓内对外接口面
  api-depend:
    template: api-depend
    target: repos/{repo}/api-depend.md
    view: contract
    summary: 本仓依赖外部接口
  data-model:
    template: data-models
    target: repos/{repo}/data-models.md
    view: development
    summary: 仓内核心数据结构
  specifications:
    template: specifications
    target: repos/{repo}/specifications.md
    view: development
    summary: 规格/可配置项/特性开关
  resource-analysis:
    template: resource-analysis
    target: repos/{repo}/resource-analysis.md
    view: development
    summary: 资源占用分析
  human-interfaces:
    template: human-interfaces
    target: repos/{repo}/human-interfaces.md
    view: runtime
    summary: 人机接口（CLI/MIB/SNMP）
  candidate:
    template: candidate-flow
    target: repos/{repo}/candidate-flow.md
    view: runtime
    summary: 全量已识别流程清单（自动深挖进度）
  candidate-flow:
    template: candidate-flow
    target: repos/{repo}/candidate-flow.md
    view: runtime
    pageType: candidate              # scaffold candidate-flow（ingest 在用）产出的页面 type: candidate
    summary: candidate 的文件名别名（scaffold candidate-flow）
  coverage:
    template: coverage
    target: global/architecture/coverage.md
    view: meta
    summary: 工作区覆盖记录（唯一、只追加）
  extra:
    template: extra
    target: global/extra/{title}.md
    view: meta
    summary: 不属于标准页型的补充页
  repo-usecase:
    template: repo-usecase
    target: repos/{repo}/usecases/{title}.md
    view: usecase
    summary: 每个行为场景一个文件
  submodule:
    view: development
    summary: 仓内子模块细节，一主题一文件夹七件套（主锚 上下文）
    members:
      上下文:
        template: submodule/上下文
        target: repos/{repo}/submodules/{topic}/上下文.md
      功能:
        template: submodule/功能
        target: repos/{repo}/submodules/{topic}/功能.md
      数据结构:
        template: submodule/数据结构
        target: repos/{repo}/submodules/{topic}/数据结构.md
      特性耦合:
        template: submodule/特性耦合
        target: repos/{repo}/submodules/{topic}/特性耦合.md
      状态迁移规则:
        template: submodule/状态迁移规则
        target: repos/{repo}/submodules/{topic}/状态迁移规则.md
      接口:
        template: submodule/接口
        target: repos/{repo}/submodules/{topic}/接口.md
      规格约束:
        template: submodule/规格约束
        target: repos/{repo}/submodules/{topic}/规格约束.md
  flow:                              # 复合型：六件套，每个成员各有自己的 template+target
    view: runtime
    summary: deep-analysis 深流程产物，一文件夹六件
    linkage:
      - needField: domain
        message: Flow page is missing domain metadata
      - needLink: [global/contracts/, /submodules/, /overview]
        message: Flow page should link related contracts, submodules, or repo overview
    members:
      调用树:
        template: flow/调用树
        target: repos/{repo}/flows/{topic}/调用树.md
      主干流程:
        template: flow/主干流程
        target: repos/{repo}/flows/{topic}/主干流程.md
      分支主题:
        template: flow/分支主题
        target: repos/{repo}/flows/{topic}/分支主题.md
      跨边界数据流:
        template: flow/跨边界数据流
        target: repos/{repo}/flows/{topic}/跨边界数据流.md
      数据结构:
        template: flow/数据结构
        target: repos/{repo}/flows/{topic}/数据结构.md
      自查报告:
        template: flow/自查报告
        target: repos/{repo}/flows/{topic}/自查报告.md
  risk:
    template: null
    target: null
    view: runtime
  index:
    template: null
    target: index.md
    view: meta
    summary: 入口，链向五视图各 catalog（人工叙事）
  log:
    template: null
    target: log.md
    view: meta
    summary: 知识库操作流水（只追加）

# ── 流程编排:阶段声明式注册,执行器(pipeline status/next)按 requires DAG 驱动 ──
# 每 stage:id / produces(产物落点,占位 {repo}{topic}) / requires(依赖) /
#   instructions(指导文件列表) / tracks(追踪表) / done(完成判定)。
# instructions 按顺序拼接后的正文只写这步动作;结构/字段/约束引用 authoring/references。
pipelines:
  ingest:
    description: 首次仓库分析,先建广度再补深度
    stages:
      - id: terrain
        produces: [repos/{repo}/overview.md, repos/{repo}/architecture.md]
        instructions: [pipelines/ingest/terrain.md]
        requires: []
        done:
          exists: produces
      - id: submodules
        produces: [repos/{repo}/submodules/]
        instructions: [pipelines/ingest/submodules.md]
        requires: [terrain]
        done:
          exists: produces
      - id: candidate-flows
        produces: [repos/{repo}/candidate-flow.md]
        instructions: [pipelines/ingest/candidate-flows.md]
        requires: [submodules]
        done:
          exists: produces
      - id: supplements
        produces:
          - repos/{repo}/glossary.md
          - repos/{repo}/api-surface.md
          - repos/{repo}/api-depend.md
          - repos/{repo}/data-models.md
          - repos/{repo}/specifications.md
          - repos/{repo}/constraints.md
          - repos/{repo}/resource-analysis.md
          - repos/{repo}/human-interfaces.md
        instructions: [pipelines/ingest/supplements.md]
        requires: [terrain]
        done:
          exists: produces
      - id: domains-contracts
        instructions: [pipelines/ingest/domains-contracts.md]
        requires: [submodules, supplements]
        done:
          instructionSelfReport: true
      - id: backlinks
        instructions: [pipelines/ingest/backlinks.md]
        requires: [domains-contracts, candidate-flows]
        done:
          instructionSelfReport: true
      - id: coverage
        produces: [global/architecture/coverage.md]
        instructions: [pipelines/ingest/coverage.md]
        requires: [domains-contracts]
        done:
          exists: produces
      - id: deep-dive
        instructions: [pipelines/ingest/deep-dive.md]
        requires: [candidate-flows, coverage, backlinks]
        foreach: candidate-flow
        runs: deep-analysis
        tracks: repos/{repo}/candidate-flow.md
        done:
          tracksAllComplete: 已深挖
  deep-analysis:
    description: 单个函数或流程的详尽追踪
    stages:
      - id: call-tree
        produces: [repos/{repo}/flows/{topic}/调用树.md]
        instructions: [pipelines/deep-analysis/call-tree.md]
        requires: []
        done:
          exists: produces
      - id: main-flow
        produces: [repos/{repo}/flows/{topic}/主干流程.md]
        instructions: [pipelines/deep-analysis/main-flow.md]
        requires: [call-tree]
        done:
          exists: produces
      - id: branches
        produces: [repos/{repo}/flows/{topic}/分支主题.md]
        instructions: [pipelines/deep-analysis/branches.md]
        requires: [main-flow]
        done:
          exists: produces
      - id: cross-boundary
        produces: [repos/{repo}/flows/{topic}/跨边界数据流.md]
        instructions: [pipelines/deep-analysis/cross-boundary.md]
        requires: [branches]
        done:
          exists: produces
      - id: data-structures
        produces: [repos/{repo}/flows/{topic}/数据结构.md]
        instructions: [pipelines/deep-analysis/data-structures.md]
        requires: [cross-boundary]
        done:
          exists: produces
      - id: self-check
        produces: [repos/{repo}/flows/{topic}/自查报告.md]
        instructions: [pipelines/deep-analysis/self-check.md]
        requires: [data-structures]
        done:
          exists: produces
