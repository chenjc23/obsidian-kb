# 结构唯一来源。维护者维护本文件；团队只维护 templates/*.template.md。
# 改落点/视图/lint/枚举 → 改这里一处，然后 `node obsidian-kb.mjs generate-docs` 同步参考文档。
schema:
  requiredFrontmatter: [title, type, repo, created, updated, confidence, status, sources]
  confidence: [high, medium, low]
  status: [active, partial, draft, deprecated]
  # init 预建目录的显式单一来源（从 init.mjs 搬来）。
  # global/extra 与仓内子目录有意不在其中（延续 init 不预建 extra 的约定）。
  initDirs: [global/use-cases, global/domains, global/contracts, global/architecture, repos]

types:
  use-case:
    template: use-case
    target: global/use-cases/{title}.md
    view: usecase
    summary: 跨仓端到端业务场景，编排 + 链接为主
  domain:
    template: domain
    target: global/domains/{title}.md
    view: logical
    summary: 业务域概念字典
  glossary:
    template: glossary
    target: repos/{repo}/glossary.md
    view: logical
    summary: 仓内术语→链接索引
  contract:
    template: contract
    target: global/contracts/{title}.md
    view: contract
    summary: 跨边界契约，定义一次被多 flow 引用
    linkage:
      - needLink: [repos/]
        message: Contract page should link producer or consumer repo/module pages
  module:
    template: module
    target: repos/{repo}/modules/{title}.md
    view: development
    summary: 单模块职责 + 依赖
  architecture:
    template: architecture
    target: repos/{repo}/architecture.md
    view: logical
    summary: 仓库逻辑视图 + 路由 + 架构图
  system-architecture:
    template: architecture
    target: global/architecture/system-architecture.md
    view: logical
    pageType: architecture          # scaffold system-architecture 产出的页面 type: architecture
    summary: 工作区唯一人工叙事总览（复用 architecture 模板）
  api-surface:
    template: api-surface
    target: repos/{repo}/api-surface.md
    view: contract
    summary: 仓内对外接口面
  data-model:
    template: data-models
    target: repos/{repo}/data-models.md
    view: development
    summary: 仓内核心数据结构
  config:
    template: config
    target: repos/{repo}/config-and-env.md
    view: development
    summary: 仓内配置与环境
  implementation:
    template: key-implementations
    target: repos/{repo}/key-implementations.md
    view: development
    summary: 仓内关键实现点
  runtime-notes:
    template: runtime-notes
    target: repos/{repo}/runtime-notes.md
    view: runtime
    summary: 仓内运行注记（错误/重试/陷阱）
  candidate:
    template: candidate-flow
    target: repos/{repo}/candidate-flow.md
    view: runtime
    summary: 全量已识别流程清单（自动深挖进度）
  candidate-flow:
    template: candidate-flow
    target: repos/{repo}/candidate-flow.md
    view: runtime
    pageType: candidate              # scaffold candidate-flow（ingest 在用）产出的页面 type: candidate
    summary: candidate 的文件名别名（scaffold candidate-flow）
  coverage:
    template: coverage
    target: global/architecture/coverage.md
    view: meta
    summary: 工作区覆盖记录（唯一、只追加）
  extra:
    template: extra
    target: global/extra/{title}.md
    view: meta
    summary: 不属于标准页型的补充页
  flow:                              # 复合型：六件套，每个成员各有自己的 template+target
    view: runtime
    summary: deep-analysis 深流程产物，一文件夹六件
    linkage:
      - needField: domain
        message: Flow page is missing domain metadata
      - needLink: [global/contracts/, /modules/]
        message: Flow page should link related contracts or modules
    members:
      调用树:
        template: flow/调用树
        target: repos/{repo}/flows/{topic}/调用树.md
      主干流程:
        template: flow/主干流程
        target: repos/{repo}/flows/{topic}/主干流程.md
      分支主题:
        template: flow/分支主题
        target: repos/{repo}/flows/{topic}/分支主题.md
      跨边界数据流:
        template: flow/跨边界数据流
        target: repos/{repo}/flows/{topic}/跨边界数据流.md
      数据结构:
        template: flow/数据结构
        target: repos/{repo}/flows/{topic}/数据结构.md
      自查报告:
        template: flow/自查报告
        target: repos/{repo}/flows/{topic}/自查报告.md
  risk:
    template: null
    target: null
    view: runtime
  index:
    template: null
    target: index.md
    view: meta
    summary: 入口，链向五视图各 catalog（人工叙事）
  log:
    template: null
    target: log.md
    view: meta
    summary: 知识库操作流水（只追加）
